name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  compose-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config

      - name: Free runner disk space
        # backend + worker images are ~2.9GB each (Playwright + Nuclei
        # templates); the default runner's ~14GB free on / can be tight when
        # building all three at once. Reclaim the large preinstalled SDKs we
        # don't use so the build never fails late on "no space left on device".
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /usr/local/share/boost /usr/local/.ghcup || true
          df -h /

      - name: Pre-pull base images via ECR mirror (dodge Docker Hub pull limits)
        # The compose build was failing at ~25-30s - before any layer builds -
        # on the base-image pulls, identically on unrelated dependabot runs, and
        # a retry-with-backoff didn't clear it: a persistent anonymous Docker Hub
        # pull limit on the shared runner IP, not a Dockerfile issue (builds fine
        # locally). public.ecr.aws mirrors the same official images with no such
        # limit; pulling + retagging them here means `docker compose build` finds
        # both tags locally and never touches Docker Hub. Dockerfiles and local
        # dev are unchanged (they still reference the plain docker.io tags).
        run: |
          set -e
          pull_retag() {
            for i in 1 2 3; do docker pull "$1" && break || sleep 10; done
            docker tag "$1" "$2"
          }
          pull_retag public.ecr.aws/docker/library/python:3.11-slim-bookworm python:3.11-slim-bookworm
          pull_retag public.ecr.aws/docker/library/node:20-alpine node:20-alpine

      - name: Build core services
        run: docker compose build backend worker frontend

  backend-tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Run backend test suite
        working-directory: backend
        env:
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests
