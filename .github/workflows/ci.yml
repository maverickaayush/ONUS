name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  compose-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config

      - name: Free runner disk space
        # backend + worker images are ~2.9GB each (Playwright + Nuclei
        # templates); the default runner's ~14GB free on / can be tight when
        # building all three at once. Reclaim the large preinstalled SDKs we
        # don't use so the build never fails late on "no space left on device".
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /usr/local/share/boost /usr/local/.ghcup || true
          df -h /

      - name: Build core services
        # Base images come from public.ecr.aws (see the Dockerfiles) to avoid
        # Docker Hub's anonymous pull rate limit, which was failing this step at
        # pull time on shared runner IPs.
        run: docker compose build backend worker frontend

  backend-tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Run backend test suite
        working-directory: backend
        env:
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests
