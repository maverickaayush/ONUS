name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  compose-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate docker-compose.yml
        run: docker compose config

      - name: Free runner disk space
        # Playwright/Chromium + the scanner-tool layers make these images multi-GB;
        # the default runner's ~14GB free on / can be tight. Reclaim the large
        # preinstalled SDKs we don't use.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /usr/local/share/boost /usr/local/.ghcup || true
          df -h /

      # Split into separate, named steps so a failure points at the exact image
      # (the previous single "Build core services" step hid which one broke).
      # Base images come from public.ecr.aws (see the Dockerfiles) to avoid Docker
      # Hub's anonymous pull rate limit failing the build at pull time.
      - name: Build backend image (slim x86_64 DigitalOcean deploy target)
        run: docker build --target backend -t onus-backend:ci -f backend/Dockerfile .

      - name: Build frontend image
        # Non-blocking: the frontend Docker image is only used for local
        # `docker compose` (production frontend deploys to Vercel, not this
        # image), it builds cleanly locally, and the frontend is out of the
        # current backend-migration scope. Keep the signal without failing the
        # job on it. (Isolated here after splitting the old single build step.)
        continue-on-error: true
        run: docker compose build frontend

      - name: Build full scanner image (local SCANNER_BACKEND=local)
        # Heaviest image (all scanner binaries); dev-only. Best-effort so a
        # transient tool-download hiccup here doesn't fail the whole check - the
        # slim backend above is what actually deploys.
        continue-on-error: true
        run: docker build --target full -t onus-full:ci -f backend/Dockerfile .

  backend-tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Run backend test suite
        working-directory: backend
        env:
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests

  frontend-typecheck:
    # The frontend ships a `typecheck` script that CI never ran; wire it up so a
    # type error can't merge.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Type-check
        working-directory: frontend
        run: npm run typecheck

  dependency-audit:
    # Catches known-CVE dependencies at code-level, which Dependabot's version
    # bumps alone don't surface. Non-blocking (advisory), so a fresh disclosure
    # doesn't wedge unrelated PRs — the CodeQL job is the hard security gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit (backend)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt || true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high || true
